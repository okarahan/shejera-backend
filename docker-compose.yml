services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shejera
      POSTGRES_USER: shejera
      POSTGRES_PASSWORD: shejera
    ports:
      - "5432:5432"
    volumes:
      - shejera_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shejera -d shejera"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  shejera_pgdata:
