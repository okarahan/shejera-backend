ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
        port = ${?PORT}
    }
    application {
        modules = [ com.shejera.ApplicationKt.module ]
    }
}

database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/shejera"
    jdbcUrl = ${?DATABASE_JDBC_URL}
    user = "shejera"
    user = ${?DATABASE_USER}
    password = "shejera"
    password = ${?DATABASE_PASSWORD}
}

shejera {
    import {
        # stub | cv  (cv uses bundled OpenCV + Tesseract libraries, no brew install)
        recognizer = "cv"
        recognizer = ${?SHEJERA_IMPORT_RECOGNIZER}
        tesseractLanguage = "tur+eng"
        tesseractLanguage = ${?SHEJERA_TESSERACT_LANG}
        # optional override; default uses bundled tessdata extracted to tmp
        tesseractDataPath = ""
        tesseractDataPath = ${?SHEJERA_TESSDATA_PATH}
    }
}
