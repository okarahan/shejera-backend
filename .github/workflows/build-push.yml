name: Build and push

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: shejera
          POSTGRES_USER: shejera
          POSTGRES_PASSWORD: shejera
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shejera -d shejera"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build fat jar
        run: |
          chmod +x gradlew
          ./gradlew buildFatJar --no-daemon \
            -Pjooq.url=jdbc:postgresql://localhost:5432/shejera \
            -Pjooq.user=shejera \
            -Pjooq.password=shejera

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
